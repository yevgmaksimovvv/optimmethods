[tox]
envlist = test, lint
skipsdist = true

[testenv]
setenv =
    PYTHONPATH = {toxinidir}/..

[testenv:test]
deps =
    pytest
commands =
    pytest -q tests

[testenv:lint]
deps =
    ruff
    mypy
    bandit
    pip-audit
    deptry
    vulture
    radon
    pytest
commands =
    ../tools/run_lab_lint.sh lr2
