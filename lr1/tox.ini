[tox]
envlist = test, lint
skipsdist = true

[testenv]
setenv =
    PYTHONPATH = {toxinidir}/..

[testenv:test]
deps =
    pytest
commands =
    pytest -q tests

[testenv:lint]
deps =
    ruff
    mypy
    bandit
    pip-audit
    deptry
    vulture
    radon
    pytest
commands =
    # TODO: отложено — снятие ignore E741 / причина — в доменном контракте используется обозначение l из формулы / риск — часть style-дефектов может остаться незамеченной / триггер возврата — плановая миграция имен параметров InputConfig/Search API
    ruff check --ignore E741 ../lr1 ../lr1/tests
    # TODO: отложено — полный mypy-покрытие UI и entrypoint / причина — исторический долг по stubs PySide6/matplotlib и legacy-аннотациям GUI / риск — типовые регрессии в UI-слое могут не ловиться mypy / триггер возврата — добавление стабильной типизации UI и согласованный переход на full-scope mypy
    mypy --follow-imports=skip ../lr1/application/analysis.py ../lr1/application/services.py ../lr1/application/viewmodels.py ../lr1/domain/functions.py ../lr1/domain/models.py ../lr1/domain/numerical.py ../lr1/domain/search.py ../lr1/infrastructure/logging.py ../lr1/infrastructure/settings.py
    bandit -q -r ../lr1 -x ../lr1/.tox,../lr1/tests
    pip-audit -r ../requirements.txt
    deptry ../lr1 ../lr1/tests --ignore DEP001,DEP002,DEP003 --requirements-files ../requirements.txt
    vulture ../lr1/application ../lr1/domain ../lr1/ui ../lr1/main.py ../lr1/__main__.py --min-confidence 80
    radon cc -s -n B ../lr1/application ../lr1/domain ../lr1/ui ../lr1/main.py ../lr1/__main__.py
    pytest -q tests/test_lr1_architecture.py
